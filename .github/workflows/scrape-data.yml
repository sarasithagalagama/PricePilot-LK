name: Scrape PricePilot Data

on:
  # Scheduled trigger paused
  # schedule:
  #   - cron: "0 0,6,12,18 * * *"

  # Manual trigger paused
  # workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "ingestion/package.json"

      - name: Install ingestion dependencies
        run: cd ingestion && npm ci

      - name: Create .env.local
        run: |
          cd ingestion
          cat > .env.local << 'EOF'
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NANOTEK_BASE_URL=https://www.nanotek.lk
          NANOTEK_REQUEST_TIMEOUT=10000
          NANOTEK_RETRY_ATTEMPTS=3
          BATCH_SIZE=50
          MATCH_CONFIDENCE_THRESHOLD=0.75
          EOF

      - name: Run ingestion pipeline
        run: cd ingestion && npm run pipeline

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Ingestion pipeline failed. Check workflow logs.'
            })
